<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XanaxVPN Pro</title>
    <script>
    // Инициализация
    const tg = window.Telegram.WebApp;
    
    // Функция, которая сработает ПРИ ЛЮБОМ клике
    function startProcessing(type) {
        console.log("Клик зафиксирован: " + type);
        
        // Визуальный эффект загрузки
        const loader = document.getElementById('loader');
        if(loader) loader.style.display = 'flex';

        // Вибрация для Telegram
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

        // Переход в бота через 1 секунду
        setTimeout(() => {
            window.location.href = 'https://t.me/XanaxVPN_robot';
        }, 1000);
    }

    function selectTariff(el) {
        // Подсветка карточки
        document.querySelectorAll('.tariff-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        
        startProcessing('tariff');
    }

    // Сообщаем Telegram, что мы готовы
    tg.ready();
    tg.expand();
</script>
