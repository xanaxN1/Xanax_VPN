<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XanaxVPN Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0d14; color: white; margin: 0; padding: 20px; text-align: center; }
        .card { background: #191f2d; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; cursor: pointer; }
        .btn-pay { background: #007aff; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .active { border-color: #4ade80 !important; background: #1a2e25 !important; }
        #loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <h2>XanaxVPN</h2>
    <p style="color: #4ade80;">● Серверы онлайн</p>

    <div class="btn-pay" onclick="pay()">🚀 Подключить VPN</div>

    <div class="grid">
        <div class="card" onclick="sel(this)">1 мес<br>99 ₽</div>
        <div class="card active" onclick="sel(this)">3 мес<br>248 ₽</div>
        <div class="card" onclick="sel(this)">6 мес<br>439 ₽</div>
        <div class="card" onclick="sel(this)">1 год<br>799 ₽</div>
    </div>

    <div id="loader">Загрузка...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sel(el) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function pay() {
            document.getElementById('loader').style.display = 'flex';
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            setTimeout(() => {
                window.location.href = 'https://t.me/XanaxVPN_robot';
            }, 1000);
        }
    </script>
</body>
</html>
